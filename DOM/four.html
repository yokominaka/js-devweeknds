<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> CODE | DOM </title>
</head>
<body style="background-color: #212121;color: white;">
    <ul class="language">
        <li>Javascript</li>
    </ul>
    
</body> 
<script>
    function addLanguage(langName){
        const li = document.createElement('li')
        li.innerHTML = `${langName}`
        document.querySelector('.language').appendChild(li)
    }
    addLanguage("python")
    addLanguage("typescript")

    function addLanguage2(langName){
        const li = document.createElement('li')
        // const textName= document.createTextNode(langName)
        // li.appendChild(textName)
        li.appendChild(document.createTextNode(langName))
        document.querySelector('.language').appendChild(li)
    }
    addLanguage2("Kotlin")

    //EDIT:
    const secLang= document.querySelector("li:nth-child(2)")
    // secLang.innerHTML= "Mojo"
    const newLi= document.createElement('li')
    newLi.textContent="Mojo"
    secLang.replaceWith(newLi)

    //change first language in list:
    const firstLang= document.querySelector("li:first-child")
    firstLang.outerHTML = '<li>Java</li>'

    //remove:
    const lastLang = document.querySelector('li:last-child')
    lastLang.remove()

</script>

</html>
