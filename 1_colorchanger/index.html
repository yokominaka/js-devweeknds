<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Scheme Switcher</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Color Scheme Switcher</h1>
        
        <div class="button-container">
            <div class="row">
                <button class="button" id="grey"></button>
                <button class="button" id="white"></button>
                <button class="button" id="blue"></button>
            </div>
            <div class="row">
                <button class="button" id="yellow"></button>
                <button class="button" id="purple"></button>
            </div>
        </div>

        <p class="instructions">
            Try clicking on one of the colors<br>
            above<br>
            to change the background<br>
            color of this page!
        </p>
    </div>

    <script src="index.js"></script>
</body>
</html>
